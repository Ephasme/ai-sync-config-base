name: AWS Pricing
description: AWS pricing lookup for service cost analysis.
method: stdio
command: uvx
args: ["awslabs.aws-pricing-mcp-server@latest"]
dependencies:
  env:
    FASTMCP_LOG_LEVEL:
      local:
        default: "ERROR"
      description: Log level for the MCP server process.
    AWS_PROFILE:
      local:
        default: "default"
      description: Local AWS profile used for AWS MCP servers.
    AWS_REGION:
      local:
        default: us-east-1
      description: AWS region for pricing API calls.
  binaries:
    - name: uvx
      version:
        require: ~0.10.0
