name: Context7
description: Library documentation lookup via Context7.
method: stdio
command: npx
args: ["-y", "@upstash/context7-mcp"]
dependencies:
  env:
    CONTEXT7_API_KEY:
      secret:
        provider: op
        ref: op://Example Vault/AI Tools/CONTEXT7_API_KEY
  binaries:
    - name: npx
      version:
        require: ~10.0.0
