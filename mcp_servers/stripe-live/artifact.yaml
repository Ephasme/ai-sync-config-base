name: Stripe (live mode)
description: Stripe MCP for live-mode API workflows (production); use with least privilege and explicit approval.
method: stdio
command: npx
args: ["-y", "@stripe/mcp@latest"]
dependencies:
  env:
    STRIPE_LIVE_SECRET_KEY:
      inject_as: STRIPE_SECRET_KEY
      local: {}
  binaries:
    - name: npx
      version:
        require: ~10.0.0
