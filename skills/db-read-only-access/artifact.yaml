name: db-read-only-access
description: >-
  Runs read-only MariaDB 10.6 queries (SELECT, SHOW, DESCRIBE, EXPLAIN), estimates
  cost with EXPLAIN / ANALYZE, and drafts write or DDL SQL for the user to run manually.
  Use when the user asks to inspect live data, explore schema, debug query performance,
  or plan a database change without executing writes from the agent.
dependencies:
  env:
    DB_HOST:
      local: {}
      description: MariaDB hostname
    DB_PORT:
      local:
        default: "3306"
      description: MariaDB port
    DB_NAME:
      local: {}
      description: Database name
    DB_RO_USER:
      local: {}
      description: Read-only database user
    DB_RO_PASSWORD:
      local: {}
      description: Read-only database password
